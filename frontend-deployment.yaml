# 1. API Version
apiVersion: apps/v1

# 2. Kind
kind: Deployment

# 3. Metadata
metadata:
  name: fintech-frontend-deployment
  labels:
    app: fintech
    component: frontend

# 4. Spec (The Blueprint)
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintech
      component: frontend
  template:
    metadata:
      labels:
        app: fintech
        component: frontend
        env: development
    spec:
      containers:
      - name: nginx-frontend
        image: nginx:latest
        ports:
        - containerPort: 80
